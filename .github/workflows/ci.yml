name: QA CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  qa-test:
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install required packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Create report and log folders
        run: |
          New-Item -ItemType Directory -Force -Path reports | Out-Null
          New-Item -ItemType Directory -Force -Path logs | Out-Null

      - name: Save environment information
        run: |
          python --version | Out-File -FilePath logs/environment_info.txt -Encoding utf8
          python -m pip freeze | Out-File -FilePath logs/environment_info.txt -Append -Encoding utf8

      - name: Run pytest automation tests
        run: |
          python -m pytest tests --junitxml=reports/result.xml --html=reports/result.html --self-contained-html *> logs/test_log.txt
          if ($LASTEXITCODE -eq 0) {
            "GO" | Out-File -FilePath reports/quality_gate.txt -Encoding utf8
            exit 0
          } else {
            "NO-GO" | Out-File -FilePath reports/quality_gate.txt -Encoding utf8
            exit $LASTEXITCODE
          }

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-test-artifacts
          path: |
            reports/result.xml
            reports/result.html
            reports/quality_gate.txt
            logs/test_log.txt
            logs/environment_info.txt