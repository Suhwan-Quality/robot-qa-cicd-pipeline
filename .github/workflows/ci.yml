name: QA CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  qa-test:
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install required packages
        run: python -m pip install -r requirements.txt

      - name: Create report and log folders
        run: |
          if not exist reports mkdir reports
          if not exist logs mkdir logs

      - name: Save environment information
        run: |
          python --version > logs/environment_info.txt
          python -m pip freeze >> logs/environment_info.txt

      - name: Run pytest automation tests
        run: python -m pytest tests --junitxml=reports/result.xml --html=reports/result.html --self-contained-html > logs/test_log.txt

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qa-test-artifacts
          path: |
            reports/result.xml
            reports/result.html
            logs/test_log.txt
            logs/environment_info.txt